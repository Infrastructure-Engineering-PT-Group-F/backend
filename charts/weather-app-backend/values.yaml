---
replicaCount: 1

image:
  repository: ghcr.io/infrastructure-engineering-pt-group-f/backend
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

tenant:
  label: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts: []
  tls: []

gateway:
  httpRoute:
    enabled: false
    parentRef:
      name: ""
      namespace: ""
      sectionName: ""
    hostname: ""

spring:
  profile: external-pg

database:
  useExistingSecret: false
  existingSecretName: "weather-app-backend-db"
  urlKey: "url"
  usernameKey: "username"
  passwordKey: "password"

apiKeys:
  useExistingSecret: true
  existingSecretName: "api-keys"
  existingSecretKey: "avwx-api-key"
  avwx: ""

serviceMonitor:
  enabled: false
  labels: {}
  interval: ""
  scrapeTimeout: ""
  path: /actuator/prometheus

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
