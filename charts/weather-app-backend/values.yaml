---
replicaCount: 1

image:
  repository: ghcr.io/infrastructure-engineering-pt-group-f/backend
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

tenant:
  label: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts: []
  tls: []

gateway:
  httpRoute:
    enabled: false
    parentRef:
      name: ""
      namespace: ""
      sectionName: ""
    hostname: ""

spring:
  profile: external-pg

database:
  useExistingSecret: false
  existingSecretName: "weather-app-backend-db"
  urlKey: "url"
  usernameKey: "username"
  passwordKey: "password"

apiKeys:
  useExistingSecret: true
  existingSecretName: "api-keys"
  existingSecretKey: "avwx-api-key"
  avwx: ""

serviceMonitor:
  enabled: false
  labels: {}
  interval: ""
  scrapeTimeout: ""
  path: /actuator/prometheus

resources:
  requests:
    cpu: 250m
    memory: 384Mi
  limits:
    cpu: "1"
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

volumes:
  - name: tmp
    emptyDir: {}

volumeMounts:
  - name: tmp
    mountPath: /tmp

nodeSelector: {}

tolerations: []

affinity: {}
